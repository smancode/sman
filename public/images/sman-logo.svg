<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon: simplified scan-face from favicon -->
  <g transform="translate(10, 10) scale(0.19)">
    <rect x="0" y="0" width="100" height="100" rx="20" fill="url(#grad)"/>
    <!-- Top-left corner -->
    <path d="M20,45 L20,20 L45,20" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Top-right corner -->
    <path d="M55,20 L80,20 L80,45" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Bottom-left corner -->
    <path d="M20,55 L20,80 L45,80" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Bottom-right corner -->
    <path d="M55,80 L80,80 L80,55" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- Eyes -->
    <rect x="30" y="40" width="10" height="18" rx="3" fill="white"/>
    <rect x="60" y="40" width="10" height="18" rx="3" fill="white"/>
    <!-- Mouth -->
    <rect x="38" y="68" width="24" height="6" rx="3" fill="white"/>
  </g>
  <!-- Text: Sman -->
  <text x="130" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="68" font-weight="700" fill="#1a1a2e" letter-spacing="-2">
    S<tspan fill="url(#grad)">man</tspan>
  </text>
</svg>
