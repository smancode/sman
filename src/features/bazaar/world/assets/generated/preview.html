<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaar 像素世界 — 开罗Q版风</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1c2c;color:#f4f4f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}
/* Top bar */
.topbar{display:flex;align-items:center;gap:16px;padding:8px 16px;background:#0d1117;border-bottom:2px solid #333;flex-shrink:0}
.topbar h1{font-size:16px;color:#FFD700}
.topbar .controls{display:flex;gap:6px;margin-left:auto;align-items:center}
.topbar button{background:#FF7043;border:none;color:#fff;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
.topbar button:hover{background:#E64A19}
.topbar span{font-size:11px;color:#94b0c2}

/* Main area */
.main{display:flex;flex:1;overflow:hidden}
/* World viewport */
.viewport{flex:1;position:relative;overflow:hidden;background:#0d1117;cursor:grab}
.viewport:active{cursor:grabbing}
.viewport canvas{display:block;image-rendering:pixelated}

/* Sidebar */
.sidebar{width:280px;background:#0d1117;border-left:2px solid #333;padding:12px;overflow-y:auto;flex-shrink:0;font-size:12px}
.sidebar h2{color:#FFD700;font-size:14px;margin-bottom:8px}
.sidebar h3{color:#FF7043;font-size:12px;margin:12px 0 4px 0}

.zone-card{background:#1a2030;border-radius:8px;padding:8px 10px;margin-bottom:6px;border-left:3px solid #666}
.zone-card.stalls{border-left-color:#FF9800}
.zone-card.plaza{border-left-color:#4CAF50}
.zone-card.reputation{border-left-color:#FFD700}
.zone-card.bounty{border-left-color:#FF5252}
.zone-card.search{border-left-color:#4FC3F7}
.zone-card.workshop{border-left-color:#7B68EE}
.zone-title{font-weight:bold;color:#f4f4f4;font-size:12px}
.zone-desc{color:#94b0c2;font-size:10px;margin-top:2px}
.zone-emoji{font-size:16px;float:right}

.agent-list{display:flex;flex-direction:column;gap:4px}
.agent-card{background:#1a2030;border-radius:6px;padding:6px 8px;display:flex;align-items:center;gap:8px}
.agent-card canvas{image-rendering:pixelated;border-radius:4px;border:1px solid #333}
.agent-info{flex:1}
.agent-name{font-weight:bold;font-size:11px;color:#f4f4f4}
.agent-detail{font-size:9px;color:#94b0c2}
.agent-state{font-size:9px;padding:1px 6px;border-radius:3px;background:#4CAF5033;color:#4CAF50;display:inline-block}

.legend{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#94b0c2}
.legend-dot{width:10px;height:10px;border-radius:2px;border:1px solid #fff2}

/* Bottom bar */
.bottombar{padding:6px 16px;background:#0d1117;border-top:2px solid #333;font-size:10px;color:#757575;display:flex;gap:16px;flex-shrink:0}

/* Tooltip */
.tooltip{position:absolute;background:#0d1117ee;border:1px solid #FFD70066;border-radius:6px;padding:6px 10px;pointer-events:none;font-size:11px;z-index:20;white-space:nowrap}
.tooltip .tt-name{color:#FFD700;font-weight:bold}
.tooltip .tt-desc{color:#94b0c2;font-size:10px}
</style>
</head>
<body>

<div class="topbar">
  <h1>🏰 Bazaar 像素世界</h1>
  <div class="controls">
    <button onclick="addRandomAgent()">+ Agent</button>

// ── Agent creation ──
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h;}return Math.abs(h);}

function createAgent(id){
  const h=hash(id);
  return {
    id,hairIdx:h%8,skinIdx:(h>>3)%4,outfitIdx:(h>>8)%7,
    x:TILE_SIZE*(5+Math.random()*30),y:TILE_SIZE*(5+Math.random()*20),
    targetX:0,targetY:0,
    facing:['down','up','left','right'][h%4],
    frame:0,animTimer:0,wanderTimer:0,
    wanderInterval:60+Math.random()*120,
    speed:1.2+Math.random()*0.4,
    name:['小明','小红','阿杰','小华','大卫','阿强','小芳','老王','小李','小美','阿飞','小刚','小雪','阿宝','小智'][h%15],

  };
}

// ── Drawing ──
function px(ctx,x,y,c,s){if(!c)return;ctx.fillStyle=c;ctx.fillRect(x*s,y*s,s,s);}

function drawAgent(ctx,agent,ox,oy,s){
  const{hairIdx:hi,skinIdx:si,outfitIdx:oi,facing:f,frame:fr}=agent;
  const hair=HAIR_COLORS[hi%7],skin=SKIN_TONES[si%4],outfit=OUTFIT_COLORS[oi%7];
  const bounce=(fr===1||fr===3)?-1:0;
  const y0=2+bounce;
  const P=(x,y,c)=>px(ctx,ox+x,oy+y,c,s);

  // Head
  for(let i=5;i<=8;i++)P(i,y0,hair);
  for(let i=4;i<=9;i++)P(i,y0+1,hair);
  P(4,y0+2,OUTLINE);for(let i=5;i<=9;i++)P(i,y0+2,skin);P(10,y0+2,OUTLINE);
  for(let i=4;i<=10;i++)P(i,y0+3,skin);
  // Eyes
  if(f==='down'){P(6,y0+4,EYE);P(9,y0+4,EYE);for(let i=4;i<=10;i++)if(i!==6&&i!==9)P(i,y0+4,skin);}
  else if(f==='left'){P(5,y0+4,EYE);P(8,y0+4,EYE);for(let i=4;i<=10;i++)if(i!==5&&i!==8)P(i,y0+4,skin);}
  else if(f==='right'){P(7,y0+4,EYE);P(10,y0+4,EYE);for(let i=4;i<=9;i++)if(i!==7)P(i,y0+4,skin);}
  else{for(let i=4;i<=10;i++)P(i,y0+4,hair);P(5,y0+4,skin);P(9,y0+4,skin);}
  for(let i=4;i<=10;i++)P(i,y0+5,skin);
  P(5,y0+6,skin);P(6,y0+6,BLUSH);for(let i=7;i<=8;i++)P(i,y0+6,skin);P(9,y0+6,BLUSH);P(10,y0+6,skin);
  for(let i=5;i<=9;i++)P(i,y0+7,skin);
  // Hair style
  const hs=hi%8;
  if(hs===0){P(5,y0-1,hair);P(8,y0-1,hair);P(3,y0,hair);P(10,y0,hair);}
  else if(hs===1){for(let d=1;d<=3;d++){P(3,y0+d,hair);P(11,y0+d,hair);}}
  else if(hs===2){P(3,y0,hair);P(11,y0,hair);P(5,y0-1,hair);P(9,y0-1,hair);}
  else if(hs===3){for(let d=1;d<=4;d++){P(2,y0+d,hair);P(12,y0+d,hair);}}
  else if(hs===4){for(let i=3;i<=11;i++)P(i,y0+1,hair);P(3,y0+2,hair);}
  else if(hs===5){for(let i=4;i<=10;i++){P(i,y0,hair);P(i,y0+1,hair);}}
  else if(hs===6){P(6,y0-2,hair);P(7,y0-2,hair);for(let i=5;i<=9;i++)P(i,y0-1,hair);}
  // Body
  const bY=10+bounce;
  for(let i=5;i<=8;i++)P(i,bY,OUTLINE);
  for(let i=4;i<=9;i++)P(i,bY+1,outfit);
  for(let i=4;i<=9;i++)P(i,bY+2,outfit);
  // Legs
  const ls=fr===1?1:(fr===3?-1:0);
  P(5+ls,bY+3,SHOES);P(6+ls,bY+4,SHOES);
  P(8-ls,bY+3,SHOES);P(7-ls,bY+4,SHOES);
}

function drawBuilding(ctx,b,cameraX,cameraY,z){

  const bc={wood:'#A1887F',woodDark:'#6D4C41',roof:'#FF7043',roofDark:'#E64A19',stone:'#BDBDBD',stoneDark:'#757575',gold:'#FFD700',banner:'#FF5252',blue:'#4FC3F7',blueDark:'#0288D1',cloth:'#FFF8E1'};
  const sc=z*TILE_SIZE/16;
  const R=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(bx+x*sc,by+y*sc,w*sc,h*sc);};

  if(b.type==='stall'){
    ctx.fillStyle=bc.roof;ctx.beginPath();ctx.ellipse(bx+bw/2,by+bh*0.25,bw*0.47,bh*0.18,0,Math.PI,0);ctx.fill();
    R(0.06,0.25,0.88,0.06,bc.roofDark);
    ctx.fillStyle=bc.banner;for(let i=0;i<5;i++)R(0.08+i*0.17,0.1,0.08,0.15,bc.banner);
    R(0.06,0.44,0.88,0.32,bc.wood);R(0.06,0.44,0.88,0.04,bc.gold);
    R(0.06,0.34,0.12,0.1,'#FF7043');R(0.32,0.34,0.12,0.1,'#4CAF50');R(0.58,0.34,0.12,0.1,'#FFD700');
    R(0.1,0.76,0.08,0.16,bc.woodDark);R(0.82,0.76,0.08,0.16,bc.woodDark);
  }else if(b.type==='reputation'){
    R(0.08,0.72,0.84,0.22,bc.stoneDark);R(0.12,0.6,0.76,0.14,bc.stone);
    R(0.14,0.08,0.72,0.5,bc.cloth);R(0.1,0.04,0.8,0.04,bc.stoneDark);R(0.1,0.58,0.8,0.04,bc.stoneDark);
    R(0.35,0,0.3,0.08,bc.gold);R(0.42,0,0.16,0.04,bc.gold);R(0.47,0.02,0.06,0.04,'#FF5252');
    ctx.fillStyle=bc.gold;[[0.28,0.24],[0.5,0.2],[0.38,0.36],[0.58,0.32],[0.28,0.44],[0.5,0.42]].forEach(([x,y])=>{R(x,y,0.05,0.05,bc.gold);});
    R(0.14,0.58,0.06,0.26,bc.stoneDark);R(0.8,0.58,0.06,0.26,bc.stoneDark);
  }else if(b.type==='bounty'){
    R(0.06,0.04,0.88,0.66,bc.woodDark);R(0.1,0.08,0.8,0.58,bc.wood);
    R(0.14,0.16,0.24,0.18,bc.cloth);R(0.48,0.12,0.3,0.2,bc.cloth);R(0.18,0.44,0.22,0.18,bc.cloth);
    R(0.24,0.12,0.03,0.03,bc.gold);R(0.58,0.08,0.03,0.03,bc.gold);R(0.26,0.4,0.03,0.03,bc.gold);
    R(0.1,0.72,0.8,0.2,bc.woodDark);R(0.14,0.68,0.06,0.26,bc.woodDark);R(0.8,0.68,0.06,0.26,bc.woodDark);
  }else if(b.type==='search'){
    R(0.15,0.72,0.7,0.22,bc.stone);
    ctx.fillStyle=bc.blue;ctx.beginPath();ctx.ellipse(bx+bw*0.5,by+bh*0.45,bw*0.3,bh*0.35,0,0,Math.PI*2);ctx.fill();
    R(0.15,0.62,0.7,0.14,bc.blueDark);R(0.3,0.2,0.2,0.12,'#B3E5FC');R(0.38,0.04,0.2,0.1,bc.gold);R(0.42,0,0.1,0.04,bc.gold);
  }else if(b.type==='workshop'){
    R(0.15,0.72,0.7,0.22,bc.blueDark);
    R(0.08,0.2,0.84,0.5,bc.blue);R(0.15,0.28,0.7,0.38,bc.stone);
    R(0.2,0.38,0.2,0.06,bc.gold);R(0.6,0.44,0.08,0.16,bc.gold);
    R(0.35,0.04,0.2,0.16,'#757575');R(0.38,0,0.12,0.22,'#757575');R(0.28,0.08,0.3,0.08,'#757575');
  }

  // Building label
  ctx.textAlign='center';
  ctx.font=`bold ${Math.max(11,Math.round(z*10))}px sans-serif`;
  // Shadow
  ctx.fillStyle='#000000aa';
  ctx.fillText(b.label,bx+bw/2+1,by-5*z+1);
  ctx.fillStyle='#f4f4f4';
  ctx.fillText(b.label,bx+bw/2,by-5*z);
}

// ── Pre-render tile layer ──
function buildTileLayer(z){
  const w=COLS*TILE_SIZE*z;
  const h=ROWS*TILE_SIZE*z;
  const tl=new OffscreenCanvas(w,h);
  const tc=tl.getContext('2d');
  tc.imageSmoothingEnabled=false;
  const ts=TILE_SIZE*z;

  const tc2={grass:'#8BC34A',grass2:'#9CCC65',grass3:'#AED581',path:'#D7CCC8',path2:'#BCAAA4',stone:'#BDBDBD',water:'#4FC3F7',dark:'#5D4037'};

  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      const tid=MAP_DATA[row]?.[col]??0;
      const h2=((col*7+row*13)&0xFF)/255;
      const v=h2<0.3?0:h2<0.7?1:2;
      const x=col*ts,y=row*ts;

      if(tid===0){
        const cs=[tc2.grass,tc2.grass2,tc2.grass3];
        tc.fillStyle=cs[v%3];tc.fillRect(x,y,ts,ts);
        tc.fillStyle='#7CB342';
        const r=ts/32;
        if(v===0){tc.fillRect(x+8*r,y+10*r,2*r,4*r);tc.fillRect(x+22*r,y+20*r,2*r,4*r);}
        if(v===1){tc.fillRect(x+14*r,y+6*r,2*r,4*r);tc.fillRect(x+6*r,y+24*r,2*r,4*r);}
        if(v===2){tc.fillRect(x+18*r,y+14*r,2*r,4*r);tc.fillRect(x+4*r,y+8*r,2*r,4*r);}
        if(v===0){tc.fillStyle='#FFD700';tc.fillRect(x+26*r,y+8*r,2*r,2*r);}
        if(v===1){tc.fillStyle='#FF8A80';tc.fillRect(x+10*r,y+18*r,2*r,2*r);}
      }else if(tid===1){
        tc.fillStyle=v===0?tc2.path:tc2.path2;tc.fillRect(x,y,ts,ts);
        tc.fillStyle=v===0?'#C8B8AE':'#B0A094';
        tc.fillRect(x+4*r,y+4*r,2*r,2*r);tc.fillRect(x+20*r,y+16*r,2*r,2*r);tc.fillRect(x+12*r,y+24*r,2*r,2*r);
      }else if(tid===2){
        tc.fillStyle=tc2.stone;tc.fillRect(x,y,ts,ts);
        tc.fillStyle='#A0A0A0';tc.fillRect(x,y+ts/2,ts,2*r);tc.fillRect(x+ts/2,y,2*r,ts/2);
      }else if(tid===3){
        tc.fillStyle=tc2.water;tc.fillRect(x,y,ts,ts);
        tc.fillStyle='#81D4FA';tc.fillRect(x+4*r,y+4*r,8*r,2*r);tc.fillRect(x+20*r,y+14*r,6*r,2*r);
      }else{
        tc.fillStyle=tc2.dark;tc.fillRect(x,y,ts,ts);
      }
    }
  }

  // Zone overlays
  for(const z2 of ZONES){
    const x1=z2.cols[0]*ts,y1=z2.rows[0]*ts;
    const w2=(z2.cols[1]-z2.cols[0])*ts,h2=(z2.rows[1]-z2.rows[0])*ts;
    tc.fillStyle=z2.color;tc.fillRect(x1,y1,w2,h2);
    tc.strokeStyle=z2.border;tc.lineWidth=2;tc.setLineDash([6,4]);tc.strokeRect(x1,y1,w2,h2);tc.setLineDash([]);
    // Zone label
    tc.font=`bold ${Math.round(ts*0.6)}px sans-serif`;
    tc.textAlign='center';
    tc.fillStyle=z2.border;
    tc.fillText(z2.name,x1+w2/2,y1+ts*0.8);
  }

  return tl;
}

// ── Main Loop ──
function gameLoop(time){
  lastTime=time;
  fpsCnt++;
  if(time-fpsT>1000){dispFps=fpsCnt;fpsCnt=0;fpsT=time;document.getElementById('fps-display').textContent=dispFps+' fps';}

  // Update agents
  for(const a of agents){
    const dx=a.targetX-a.x,dy=a.targetY-a.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>2){
      a.x+=(dx/dist)*a.speed;a.y+=(dy/dist)*a.speed;
      if(Math.abs(dx)>Math.abs(dy))a.facing=dx>0?'right':'left';
      else a.facing=dy>0?'down':'up';
      a.animTimer++;if(a.animTimer>=6){a.frame=(a.frame+1)%4;a.animTimer=0;}
      a.state='walking';
    }else{
      a.frame=0;a.state='idle';
      a.wanderTimer++;
      if(a.wanderTimer>=a.wanderInterval){
        a.wanderTimer=0;a.wanderInterval=60+Math.random()*120;
        a.targetX=TILE_SIZE*(5+Math.random()*30);
        a.targetY=TILE_SIZE*(5+Math.random()*20);
      }
    }
  }

  // Render
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(tileLayer,cameraX,cameraY,canvas.width,canvas.height,0,0,canvas.width,canvas.height);

  // Buildings
  for(const b of BUILDINGS) drawBuilding(ctx,b,cameraX,cameraY,zoom);

  // Agents sorted by Y
  const sorted=[...agents].sort((a,b)=>a.y-b.y);
  const s=zoom;
  for(const a of sorted){
    const ax=a.x*s-cameraX;
    const ay=a.y*s-cameraY;
    if(ax+32*s<0||ax-32*s>canvas.width||ay+32*s<0||ay-32*s>canvas.height)continue;
    const bounce=(a.frame===1||a.frame===3)?-1:0;
    drawAgent(ctx,a,ax/s-4,(ay/s-14+bounce),s);
    // Name tag
    const tagY=ay-18*s+bounce*s;
    ctx.font=`bold ${Math.max(9,Math.round(s*7))}px monospace`;
    ctx.textAlign='center';
    const nw=ctx.measureText(a.name).width;
    ctx.fillStyle='rgba(26,28,44,0.8)';ctx.fillRect(ax-nw/2-3,tagY-2,nw+6,12*s);
    ctx.fillStyle='#f4f4f4';ctx.fillText(a.name,ax,tagY+8*s);
    // State indicator
    if(a.state==='walking'){
      ctx.fillStyle='#FFD700';ctx.font=`${Math.round(s*8)}px serif`;ctx.fillText('💬',ax+12*s,tagY-2*s);
    }
  }

  document.getElementById('agent-count').textContent=agents.length+' agents';
  requestAnimationFrame(gameLoop);
}

// ── Sidebar update ──
function updateSidebar(){
  const list=document.getElementById('agent-list');
  document.getElementById('sidebar-agent-count').textContent=agents.length;
  list.innerHTML='';
  for(const a of agents.slice(0,12)){
    const card=document.createElement('div');card.className='agent-card';
    const c=document.createElement('canvas');c.width=40;c.height=40;
    const cx=c.getContext('2d');
    drawAgent(cx,{hairIdx:a.hairIdx,skinIdx:a.skinIdx,outfitIdx:a.outfitIdx,facing:'down',frame:0},2,4,2);
    const info=document.createElement('div');info.className='agent-info';
    info.innerHTML=`<div class="agent-name">${a.name}</div>
      <div class="agent-detail">${HAIR_NAMES[a.hairIdx%8]} · ${['浅','自','麦','深'][a.skinIdx%4]}</div>
      <span class="agent-state">${a.state==='walking'?'走动中':'待机'}</span>`;
    card.append(c,info);list.appendChild(card);
  }
  if(agents.length>12){
    const more=document.createElement('div');
    more.style.cssText='text-align:center;color:#94b0c2;font-size:10px;padding:4px';
    more.textContent=`还有 ${agents.length-12} 个...`;
    list.appendChild(more);
  }
}

// ── Interaction ──
function initInteraction(){
  const vp=document.getElementById('viewport');
  const tt=document.getElementById('tooltip');

  vp.addEventListener('mousedown',e=>{
    dragging=true;dragSX=e.clientX;dragSY=e.clientY;camSX=cameraX;camSY=cameraY;
  });
  window.addEventListener('mousemove',e=>{
    if(dragging){
      cameraX=camSX-(e.clientX-dragSX);cameraY=camSY-(e.clientY-dragSY);
      cameraX=Math.max(0,Math.min(tileLayer.width-canvas.width,cameraX));
      cameraY=Math.max(0,Math.min(tileLayer.height-canvas.height,cameraY));
    }
    // Hover check
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    const wx=(mx+cameraX)/zoom;
    const wy=(my+cameraY)/zoom;
    let found=null;
    for(const b of BUILDINGS){
      const isLarge=b.type==='reputation'||b.type==='bounty';
      const bw=(isLarge?3:2)*TILE_SIZE,bh=bw;
      const bx=b.col*TILE_SIZE,by=b.row*TILE_SIZE;
      if(wx>=bx&&wx<=bx+bw&&wy>=by&&wy<=by+bh){found=b;break;}
    }
    if(found){
      tt.style.display='block';
      tt.style.left=(e.clientX-vp.getBoundingClientRect().left+12)+'px';
      tt.style.top=(e.clientY-vp.getBoundingClientRect().top-10)+'px';
      tt.innerHTML=`<div class="tt-name">${found.label}</div><div class="tt-desc">${found.desc}</div>`;
    }else{
      tt.style.display='none';
    }
  });
  window.addEventListener('mouseup',()=>{dragging=false;});

  // Zoom with scroll
  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    const oldZoom=zoom;
    zoom=Math.max(2,Math.min(6,zoom-e.deltaY*0.003));
    if(zoom!==oldZoom){
      document.getElementById('zoom-info').textContent='缩放: '+zoom.toFixed(1)+'x';
      // Zoom toward mouse
      const rect=canvas.getBoundingClientRect();
      const mx=e.clientX-rect.left;
      const my=e.clientY-rect.top;
      cameraX=cameraX*(zoom/oldZoom)+mx*(1-zoom/oldZoom);
      cameraY=cameraY*(zoom/oldZoom)+my*(1-zoom/oldZoom);
      cameraX=Math.max(0,Math.min(tileLayer.width-canvas.width,cameraX));
      cameraY=Math.max(0,Math.min(tileLayer.height-canvas.height,cameraY));
      tileLayer=buildTileLayer(zoom);
      // Resize canvas
      canvas.width=vp.clientWidth;canvas.height=vp.clientHeight;
    }
  },{passive:false});
}

// ── Global Actions ──
window.addRandomAgent=function(){
  const a=createAgent('a'+Math.random().toString(36).slice(2,8));
  a.targetX=TILE_SIZE*(5+Math.random()*30);a.targetY=TILE_SIZE*(5+Math.random()*20);
  agents.push(a);updateSidebar();
};
window.add5Agents=function(){for(let i=0;i<5;i++)addRandomAgent();};
window.removeAllAgents=function(){agents=[];updateSidebar();};

// ── Init ──
window.addEventListener('DOMContentLoaded',()=>{
  canvas=document.getElementById('world-canvas');
  const vp=document.getElementById('viewport');
  canvas.width=vp.clientWidth;canvas.height=vp.clientHeight;
  ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;

  tileLayer=buildTileLayer(zoom);

  // Center camera on plaza
  cameraX=COLS*TILE_SIZE*zoom/2-canvas.width/2;
  cameraY=9.5*TILE_SIZE*zoom-canvas.height/2;

  // Initial agents
  for(let i=0;i<8;i++)addRandomAgent();
  updateSidebar();

  initInteraction();
  requestAnimationFrame(gameLoop);

  // Periodic sidebar update
  setInterval(updateSidebar,2000);
});
</script>
